name: Refresh Macro Dashboard

on:
  schedule:
    - cron: "0 13 * * 1-5"     # Weekdays 1:00 PM UTC (8 AM ET, pre-market)
    - cron: "30 21 * * 1-5"    # Weekdays 9:30 PM UTC (4:30 PM ET, post-close)
  workflow_dispatch:             # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Save old indicators for signal comparison
        run: cp data/indicators.json data/indicators_old.json 2>/dev/null || true

      - name: Run refresh_macro.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python refresh_macro.py

      - name: Check for signal flips and alert via Feishu
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          if python check_signal_flips.py data/indicators_old.json data/indicators.json; then
            if [ -n "$FEISHU_WEBHOOK" ] && [ -f /tmp/signal_alert.json ]; then
              curl -s -X POST "$FEISHU_WEBHOOK" \
                -H "Content-Type: application/json" \
                -d @/tmp/signal_alert.json
              echo "  ✅ Feishu alert sent"
            fi
          else
            echo "  ✅ No signal flips"
          fi

      - name: Copy PWA assets into output with build timestamp
        run: |
          BUILD_TS=$(date -u '+%Y%m%d%H%M%S')
          sed "s/__BUILD_TS__/$BUILD_TS/" static/sw.js > output/sw.js
          cp static/manifest.json output/manifest.json
          cp static/icon-192.png output/icon-192.png
          cp static/icon-512.png output/icon-512.png

      - name: Commit updated data and dashboard to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/indicators.json data/rules.json output/index.html output/sw.js
          git diff --cached --quiet || git commit -m "Auto-refresh data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
